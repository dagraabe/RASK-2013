<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASK Treningsplan</title>
<style>
/* ── RASK farger ─────────────────────────────────────────────────────── */
:root {
  --rask-dark:   #0b5d3b;
  --rask-green:  #2bb673;
  --rask-gold:   #c8a85b;
  --rask-light:  #e8f5ee;
  --rask-bg:     #f3f6f4;
  --rask-white:  #ffffff;
  --rask-text:   #1a2e24;
  --rask-muted:  #607060;
  --rask-border: #c8ddd2;
  --radius:      10px;
}

/* ── Reset & base ────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  background: var(--rask-bg);
  color: var(--rask-text);
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────────────────────────────── */
header {
  background: var(--rask-dark);
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 10px;
}

.logo-badge {
  width: 44px; height: 44px;
  background: var(--rask-gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 15px; color: var(--rask-dark);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

#tittel {
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  font-weight: 800;
  color: var(--rask-white);
  letter-spacing: 0.02em;
}

.navn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.navn-row label {
  color: rgba(255,255,255,0.75);
  font-size: 0.82rem;
  font-weight: 600;
}

#navn-input {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 6px;
  color: white;
  font-size: 0.9rem;
  padding: 5px 10px;
  width: 170px;
  outline: none;
}
#navn-input::placeholder { color: rgba(255,255,255,0.5); }
#navn-input:focus { border-color: var(--rask-gold); background: rgba(255,255,255,0.22); }

/* ── Fremgang-summary ────────────────────────────────────────────────── */
.summary-bar-wrap {
  max-width: 860px;
  margin: 14px auto 0;
  padding: 0 16px;
}

.summary-bar-bg {
  background: rgba(255,255,255,0.18);
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
}
.summary-bar-fill {
  height: 100%;
  background: var(--rask-gold);
  border-radius: 20px;
  transition: width 0.4s ease;
}
.summary-text {
  color: rgba(255,255,255,0.75);
  font-size: 0.78rem;
  margin-top: 4px;
  text-align: right;
}

/* ── Wrapper ─────────────────────────────────────────────────────────── */
.wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ── Kategori-kort ───────────────────────────────────────────────────── */
.kat {
  background: var(--rask-white);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(11,93,59,0.10);
  margin-bottom: 20px;
  overflow: hidden;
}

.kat-header {
  background: var(--rask-dark);
  color: white;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.kat-ikon {
  font-size: 1.4rem;
  line-height: 1;
}

.kat-tittel {
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: 0.04em;
}

.kat-fremgang {
  margin-left: auto;
  font-size: 0.82rem;
  color: var(--rask-gold);
  font-weight: 700;
}

.kat-body {
  padding: 6px 0;
}

/* ── Øvelse-rad ──────────────────────────────────────────────────────── */
.ovelse {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 14px;
  padding: 12px 18px;
  align-items: center;
  border-bottom: 1px solid var(--rask-border);
  transition: background 0.2s;
}
.ovelse:last-child { border-bottom: none; }
.ovelse.ferdig { background: var(--rask-light); }

/* Vertikal søyle */
.soyle-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.soyle-bg {
  width: 28px;
  height: 80px;
  background: #e0ede7;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.soyle-fill {
  width: 100%;
  background: linear-gradient(180deg, var(--rask-green), var(--rask-dark));
  border-radius: 14px;
  transition: height 0.4s ease;
  min-height: 0;
}

.soyle-pct {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--rask-muted);
}

/* Info-del */
.ovelse-info { }

.ovelse-navn {
  font-weight: 700;
  font-size: 0.97rem;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ferdig-check {
  display: none;
  color: var(--rask-green);
  font-size: 1rem;
}
.ovelse.ferdig .ferdig-check { display: inline; }

.ovelse-teller {
  font-size: 0.85rem;
  color: var(--rask-muted);
  margin-bottom: 8px;
}

/* Mini progress bar */
.mini-bar {
  height: 5px;
  background: #dde9e4;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 9px;
}
.mini-bar div {
  height: 100%;
  background: linear-gradient(90deg, var(--rask-green), var(--rask-dark));
  border-radius: 10px;
  transition: width 0.4s ease;
}

/* Knapper */
.knapper {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  border: none;
  border-radius: 7px;
  padding: 6px 12px;
  font-weight: 700;
  font-size: 0.84rem;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  user-select: none;
}
.btn:active { transform: scale(0.94); }
.btn.minus { background: var(--rask-dark); color: white; }
.btn.minus:hover { opacity: 0.85; }
.btn.plus  { background: var(--rask-gold); color: var(--rask-dark); }
.btn.plus:hover  { opacity: 0.85; }

/* ── Utholdenhet: toggle ──────────────────────────────────────────────── */
.btn-toggle {
  border: 2px solid var(--rask-dark);
  border-radius: 8px;
  padding: 7px 16px;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  background: white;
  color: var(--rask-dark);
  transition: all 0.2s;
}
.btn-toggle.done {
  background: var(--rask-dark);
  color: white;
  border-color: var(--rask-dark);
}

/* ── Fullfort-melding ─────────────────────────────────────────────────── */
#fullfort {
  display: none;
  text-align: center;
  background: linear-gradient(135deg, var(--rask-dark), #145e3e);
  color: white;
  border-radius: var(--radius);
  padding: 30px 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(11,93,59,0.35);
}
#fullfort .emoji { font-size: 3.5rem; }
#fullfort h2 { font-size: 1.8rem; font-weight: 900; margin: 8px 0 4px; color: var(--rask-gold); }
#fullfort p { color: rgba(255,255,255,0.85); font-size: 0.95rem; }

/* ── Mål-editor ──────────────────────────────────────────────────────── */
.maal-editor {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed #d0ddd8;
  flex-wrap: wrap;
}
.maal-editor label {
  font-size: 0.75rem;
  color: var(--rask-muted);
  font-weight: 600;
  white-space: nowrap;
}
.maal-editor input[type=number] {
  width: 70px;
  padding: 4px 6px;
  border: 1.5px solid #b0c8bc;
  border-radius: 6px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--rask-dark);
  text-align: center;
  outline: none;
}
.maal-editor input[type=number]:focus { border-color: var(--rask-green); }
.btn-maal {
  background: var(--rask-dark);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 11px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-maal:hover { opacity: 0.82; }

/* ── Nullstill ───────────────────────────────────────────────────────── */
.nullstill-wrap {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.btn-nullstill {
  background: none;
  border: 1.5px solid #aaa;
  color: #888;
  border-radius: 7px;
  padding: 7px 18px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-nullstill:hover { border-color: var(--rask-dark); color: var(--rask-dark); }
.btn-nullstill-alt {
  background: none;
  border: 1.5px solid #d9534f;
  color: #d9534f;
  border-radius: 7px;
  padding: 7px 18px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-nullstill-alt:hover { background: #d9534f; color: white; }

/* ── Responsivt ──────────────────────────────────────────────────────── */
@media (max-width: 480px) {
  .ovelse { grid-template-columns: 46px 1fr; gap: 10px; padding: 10px 12px; }
  .soyle-bg { width: 22px; height: 65px; }
  .btn { padding: 5px 9px; font-size: 0.80rem; }
}

/* ── Påske-banner ───────────────────────────────────────────────────── */
.paske-banner {
  background: linear-gradient(90deg, #2bb673, #0b5d3b);
  color: white;
  text-align: center;
  padding: 10px 16px;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.paske-banner span { font-size: 1.1rem; }

/* ── Logo-img ─────────────────────────────────────────────────────────── */
.logo-img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: white;
  padding: 3px;
  object-fit: contain;
  flex-shrink: 0;
}

/* ── Utholdenhet-note ────────────────────────────────────────────────── */
.kat-note {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.75);
  font-style: italic;
  margin-left: auto;
  max-width: 260px;
  text-align: right;
  line-height: 1.3;
}
</style>
</head>

</header>

<div class="wrapper">

  <!-- Fullfort -->
  <div id="fullfort">
    <div class="emoji">🏆</div>
    <h2>BRA JOBBA!</h2>
    <p id="fullfort-navn">Du har fullført hele treningsprogrammet!</p>
  </div>

  <!-- Kategorier genereres av JS -->
  <div id="container"></div>

  <div class="nullstill-wrap">
    <button class="btn-nullstill" onclick="nullstillFremgang()">↺ Nullstill fremgang</button>
    <button class="btn-nullstill-alt" onclick="nullstillAlt()">✕ Nullstill alt (inkl. mål)</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const STORAGE = "rask_treningsplan_v3";

const kategorier = [
  {
    id: "ball",
    tittel: "Balltekniske øvelser",
    ikon: "⚽",
    type: "teller",
    ovelser: [
      { id:"innside",    navn:"Pasninger mot vegg – innsiden av fot",  maal:2500, steg:100  },
      { id:"utside",     navn:"Pasninger mot vegg – utsiden av fot",   maal:2500, steg:100  },
      { id:"saledrag",   navn:"Såledragninger i firkant rundt kjegle", maal:2500, steg:100  },
      { id:"taptoe",     navn:'Tap-toe',                               maal:2500, steg:100  },
      { id:"oversteg",   navn:"Overstegsfinter",                       maal:300,  steg:50   },
    ]
  },
  {
    id: "styrke",
    tittel: "Styrkeøvelser",
    ikon: "💪",
    type: "teller",
    ovelser: [
      { id:"situps",     navn:"Situps  (2 × 30 per økt)",                          maal:300, steg:30 },
      { id:"pushups",    navn:"Pushups  (2 × 15 per økt)",                         maal:180, steg:15 },
      { id:"rumpa",      navn:"Sitte på rumpa m/ vekt – side  (2 × 20 per økt)",   maal:200, steg:20 },
      { id:"kneboj",     navn:"Knebøy med rett rygg  (1 × 30 per økt)",            maal:150, steg:30 },
      { id:"planke",     navn:"Planke  (3 min per økt – registrer minutter)",       maal:15,  steg:3  },
      { id:"utfall",     navn:"Doble utfall  (20 per ben per økt)",                 maal:200, steg:20 },
    ]
  },
  {
    id: "utholdenhet",
    tittel: "Utholdenhetsøvelser",
    ikon: "🏃",
    type: "toggle",
    note: "Kan byttes med skiturer eller annen utholdenhet – forsøk å gjennomføre minst 1 løpetur.",
    ovelser: [
      { id:"jogg30",     navn:"Rolig jogg 30 min + 5 spurter (30 m, slak nedoverbakke)",  maal:1 },
      { id:"bakke20",    navn:"15 min jogg + 20 spurter i oppoverbakke (ca. 20 m)",        maal:1 },
      { id:"intervall",  navn:"Intervall: 10 min oppvarming + 4 × 2 min intervall",        maal:1 },
    ]
  }
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem(STORAGE) || "{}");
if (!state.progress) state.progress = {};
if (!state.navn)     state.navn     = "";
if (!state.maaler)   state.maaler   = {};

// Sikre alle øvelser finnes i state
kategorier.forEach(k => k.ovelser.forEach(o => {
  if (state.progress[o.id] === undefined) state.progress[o.id] = 0;
  if (state.maaler[o.id]   === undefined) state.maaler[o.id]   = o.maal;
}));

// Hjelpe-funksjon: hent effektivt mål (brukerens eller standard)
function getMaal(id) {
  return state.maaler[id] ?? kategorier.flatMap(k => k.ovelser).find(o => o.id === id)?.maal ?? 1;
}

function save() {
  localStorage.setItem(STORAGE, JSON.stringify(state));
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVN
// ─────────────────────────────────────────────────────────────────────────────
const navnInput = document.getElementById("navn-input");
navnInput.value = state.navn;
oppdaterTittel();

navnInput.addEventListener("input", () => {
  state.navn = navnInput.value.trim();
  save();
  oppdaterTittel();
});

function oppdaterTittel() {
  const n = state.navn;
  document.getElementById("tittel").textContent =
    n ? n + " sin treningsplan" : "RASK Treningsplan";
  const fp = document.getElementById("fullfort-navn");
  if (fp) fp.textContent =
    n ? n + " har fullført hele treningsprogrammet! 🎉" : "Du har fullført hele treningsprogrammet!";
}

// ─────────────────────────────────────────────────────────────────────────────
// TOTAL FREMGANG
// ─────────────────────────────────────────────────────────────────────────────
function oppdaterTotal() {
  let totMaal = 0, totNaa = 0, allFerdig = true;
  kategorier.forEach(k => k.ovelser.forEach(o => {
    const m = getMaal(o.id);
    const v = state.progress[o.id];
    totMaal += m;
    totNaa  += Math.min(v, m);
    if (v < m) allFerdig = false;
  }));
  const pct = Math.round(totNaa / totMaal * 100);
  document.getElementById("total-bar").style.width   = pct + "%";
  document.getElementById("total-tekst").textContent  = pct + " % fullført";
  document.getElementById("fullfort").style.display = allFerdig ? "block" : "none";
  oppdaterTittel();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  kategorier.forEach(kat => {
    // ── Beregn kategori-fremgang ──
    let katMaal = 0, katNaa = 0;
    kat.ovelser.forEach(o => {
      const m = getMaal(o.id);
      katMaal += m;
      katNaa  += Math.min(state.progress[o.id], m);
    });
    const katPct = Math.round(katNaa / katMaal * 100);

    // ── Kategori-container ──
    const kortEl = document.createElement("div");
    kortEl.className = "kat";

    // Header
    const hdr = document.createElement("div");
    hdr.className = "kat-header";
    hdr.innerHTML = `
      <span class="kat-ikon">${kat.ikon}</span>
      <span class="kat-tittel">${kat.tittel}</span>
      ${kat.note ? `<span class="kat-note">${kat.note}</span>` : `<span class="kat-fremgang">${katPct} %</span>`}
    `;
    kortEl.appendChild(hdr);

    // Body
    const body = document.createElement("div");
    body.className = "kat-body";

    // ── Øvelser ──
    kat.ovelser.forEach(o => {
      const maal = getMaal(o.id);
      const v   = state.progress[o.id];
      const pct = Math.min(v / maal * 100, 100);
      const er_ferdig = v >= maal;

      const rad = document.createElement("div");
      rad.className = "ovelse" + (er_ferdig ? " ferdig" : "");

      if (kat.type === "teller") {
        // ── Telleøvelse ──
        rad.innerHTML = `
          <div class="soyle-wrap">
            <div class="soyle-bg">
              <div class="soyle-fill" style="height:${pct}%"></div>
            </div>
            <div class="soyle-pct">${Math.round(pct)}%</div>
          </div>
          <div class="ovelse-info">
            <div class="ovelse-navn">
              ${o.navn}
              <span class="ferdig-check">✔</span>
            </div>
            <div class="ovelse-teller">
              <strong>${v}</strong> / ${maal}
            </div>
            <div class="mini-bar"><div style="width:${pct}%"></div></div>
            <div class="knapper">
              <button class="btn minus" data-id="${o.id}" data-delta="${-o.steg}">−${o.steg}</button>
              <button class="btn plus"  data-id="${o.id}" data-delta="${+o.steg}">+${o.steg}</button>
            </div>
            <div class="maal-editor">
              <label>Mål:</label>
              <input type="number" class="maal-input" data-id="${o.id}" value="${maal}" min="1" step="1">
              <button class="btn-maal" data-id="${o.id}">Oppdater</button>
            </div>
          </div>`;
      } else {
        // ── Toggle-øvelse (utholdenhet) ──
        rad.innerHTML = `
          <div class="soyle-wrap">
            <div class="soyle-bg">
              <div class="soyle-fill" style="height:${pct}%"></div>
            </div>
            <div class="soyle-pct">${er_ferdig ? "100%" : "0%"}</div>
          </div>
          <div class="ovelse-info">
            <div class="ovelse-navn">
              ${o.navn}
              <span class="ferdig-check">✔</span>
            </div>
            <div class="ovelse-teller">
              ${er_ferdig ? "<strong>Fullført ✓</strong>" : "Ikke startet"}
            </div>
            <div class="mini-bar"><div style="width:${pct}%"></div></div>
            <div class="knapper">
              <button class="btn-toggle${er_ferdig ? " done" : ""}" data-id="${o.id}">
                ${er_ferdig ? "✔ Gjort" : "Marker som gjort"}
              </button>
              ${er_ferdig ? `<button class="btn minus" data-id="${o.id}" data-delta="-1" style="font-size:0.75rem;padding:5px 8px">Angre</button>` : ""}
            </div>
          </div>`;
      }

      body.appendChild(rad);
    });

    kortEl.appendChild(body);
    container.appendChild(kortEl);
  });

  // ── Event listeners (delegert) ──
  container.querySelectorAll(".btn[data-delta]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id    = btn.dataset.id;
      const delta = parseInt(btn.dataset.delta);
      const maal  = getMaal(id);
      state.progress[id] = Math.max(0, Math.min(maal, state.progress[id] + delta));
      save();
      render();
    });
  });

  container.querySelectorAll(".btn-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      state.progress[id] = state.progress[id] >= 1 ? 0 : 1;
      save();
      render();
    });
  });

  // ── Mål-oppdatering ──
  container.querySelectorAll(".btn-maal").forEach(btn => {
    btn.addEventListener("click", () => {
      const id  = btn.dataset.id;
      const inp = container.querySelector(`.maal-input[data-id="${id}"]`);
      const nyMaal = parseInt(inp.value);
      if (!nyMaal || nyMaal < 1) return;
      state.maaler[id] = nyMaal;
      // Kapp fremgang til nytt mål
      if (state.progress[id] > nyMaal) state.progress[id] = nyMaal;
      save();
      render();
    });
  });

  // Tillat Enter i mål-feltet
  container.querySelectorAll(".maal-input").forEach(inp => {
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") container.querySelector(`.btn-maal[data-id="${inp.dataset.id}"]`).click();
    });
  });

  oppdaterTotal();
}

// ─────────────────────────────────────────────────────────────────────────────
// NULLSTILL
// ─────────────────────────────────────────────────────────────────────────────
function nullstillFremgang() {
  if (!confirm("Nullstille all fremgang? (Navn og mål beholdes)")) return;
  kategorier.forEach(k => k.ovelser.forEach(o => { state.progress[o.id] = 0; }));
  save();
  render();
}

function nullstillAlt() {
  if (!confirm("Nullstille ALT – fremgang, mål og navn? Dette kan ikke angres.")) return;
  state.progress = {};
  state.maaler   = {};
  state.navn     = "";
  kategorier.forEach(k => k.ovelser.forEach(o => {
    state.progress[o.id] = 0;
    state.maaler[o.id]   = o.maal;
  }));
  document.getElementById("navn-input").value = "";
  save();
  oppdaterTittel();
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────────────────────────────
render();
</script>

</body>
</html>
